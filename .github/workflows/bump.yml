name: Bump & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'altstore-source.json'   # ignore the bot commit from the release job

permissions:
  contents: write

jobs:
  bump:
    name: Bump version tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  release:
    name: Release
    needs: bump
    if: needs.bump.outputs.new_tag != ''
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.bump.outputs.new_tag }}
    permissions:
      contents: write
