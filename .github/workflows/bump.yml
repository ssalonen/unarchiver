name: Bump & Tag

# Fires when MARKETING_VERSION is changed in the Xcode project on main.
on:
  push:
    branches: [main]
    paths:
      - 'UnArchiver.xcodeproj/project.pbxproj'

permissions:
  contents: write

jobs:
  bump:
    name: Create tag and trigger release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v6

      - name: Read MARKETING_VERSION
        id: ver
        run: |
          VN=$(grep -m1 'MARKETING_VERSION' UnArchiver.xcodeproj/project.pbxproj \
                 | awk -F' = ' '{print $2}' | tr -d '; ')
          echo "tag=v${VN}" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" \
               --repo "${{ github.repository }}" &>/dev/null 2>&1; then
            echo "Release ${{ steps.ver.outputs.tag }} already exists – skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

  release:
    name: Release
    needs: bump
    if: needs.bump.outputs.skip != 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.bump.outputs.tag }}
    permissions:
      contents: write
