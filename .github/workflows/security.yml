name: Security

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"   # every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # needed to upload SARIF to GitHub Security tab
  pull-requests: read

jobs:
  # ------------------------------------------------------------------ #
  #  1. CodeQL – static analysis on your own Swift code                 #
  # ------------------------------------------------------------------ #
  codeql:
    name: CodeQL (Swift)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          # Catch common issues: injection, unsafe deserialization, path traversal, etc.
          queries: security-extended

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver

      - name: Build (for CodeQL)
        run: |
          xcodebuild build \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"

  # ------------------------------------------------------------------ #
  #  2. OSV Scanner – known CVEs in dependencies                        #
  # ------------------------------------------------------------------ #
  osv:
    name: OSV Vulnerability Scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    permissions:
      security-events: write
      contents: read

  # ------------------------------------------------------------------ #
  #  3. Supply-chain check – verify package URLs haven't changed        #
  # ------------------------------------------------------------------ #
  supply-chain:
    name: Supply-chain Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify expected package URLs
        run: |
          python3 - <<'PYEOF'
          import sys, re

          EXPECTED = {
              "SWCompression": "https://github.com/tsolomko/SWCompression",
              "Highlightr":    "https://github.com/raspu/Highlightr",
          }

          with open("UnArchiver.xcodeproj/project.pbxproj") as f:
              pbxproj = f.read()

          errors = []
          for name, url in EXPECTED.items():
              pattern = rf'XCRemoteSwiftPackageReference "{re.escape(name)}"[^{{]*\{{[^}}]*repositoryURL\s*=\s*"([^"]+)"'
              m = re.search(pattern, pbxproj, re.DOTALL)
              if not m:
                  errors.append(f"MISSING: {name} not found in project.pbxproj")
              elif m.group(1) != url:
                  errors.append(
                      f"MISMATCH: {name}\n"
                      f"  expected: {url}\n"
                      f"  found:    {m.group(1)}"
                  )
              else:
                  print(f"OK  {name}  →  {url}")

          if errors:
              print("\n--- SUPPLY CHAIN ERRORS ---")
              for e in errors:
                  print(e)
              sys.exit(1)
          PYEOF

      - name: Verify Package.swift matches project.pbxproj
        run: |
          python3 - <<'PYEOF'
          import re, sys

          pbxproj   = open("UnArchiver.xcodeproj/project.pbxproj").read()
          pkg_swift = open("Package.swift").read()

          # --- Parse project.pbxproj -------------------------------------------
          # The XCRemoteSwiftPackageReference section looks like:
          #   /* Begin XCRemoteSwiftPackageReference section */
          #   UUID /* XCRemoteSwiftPackageReference "NAME" */ = {
          #       isa = XCRemoteSwiftPackageReference;
          #       repositoryURL = "URL";
          #       requirement = { kind = upToNextMajorVersion; minimumVersion = X.Y.Z; };
          #   };
          #   /* End XCRemoteSwiftPackageReference section */
          #
          # NOTE: nested braces (requirement = { }) break naive block-end detection,
          # so we parse the whole section and zip urls with versions in order.
          section = re.search(
              r'/\* Begin XCRemoteSwiftPackageReference section \*/'
              r'(.*?)'
              r'/\* End XCRemoteSwiftPackageReference section \*/',
              pbxproj, re.DOTALL
          )
          if not section:
              print("ERROR: XCRemoteSwiftPackageReference section not found in project.pbxproj")
              sys.exit(1)

          urls     = re.findall(r'repositoryURL\s*=\s*"([^"]+)"',  section.group(1))
          versions = re.findall(r'minimumVersion\s*=\s*(\S+?)\s*;', section.group(1))

          if len(urls) != len(versions):
              print(f"ERROR: found {len(urls)} URLs but {len(versions)} minimumVersion values "
                    f"in pbxproj — manual inspection needed")
              sys.exit(1)

          pbx_deps = dict(zip(urls, versions))

          # --- Parse Package.swift ---------------------------------------------
          # Lines look like:
          #   .package(url: "URL", from: "X.Y.Z"),
          pkg_deps = {
              url: ver
              for url, ver in re.findall(
                  r'\.package\s*\(\s*url:\s*"([^"]+)"\s*,\s*from:\s*"([^"]+)"',
                  pkg_swift
              )
          }

          # --- Compare both ways -----------------------------------------------
          errors = []

          for url, pbx_ver in pbx_deps.items():
              if url not in pkg_deps:
                  errors.append(
                      f"MISSING from Package.swift:\n"
                      f"  {url}  (pbxproj requires {pbx_ver})\n"
                      f"  Add:  .package(url: \"{url}\", from: \"{pbx_ver}\")"
                  )
              elif pkg_deps[url] != pbx_ver:
                  errors.append(
                      f"VERSION MISMATCH: {url}\n"
                      f"  project.pbxproj requires : {pbx_ver}\n"
                      f"  Package.swift declares   : {pkg_deps[url]}"
                  )
              else:
                  print(f"OK  {url}  @  {pbx_ver}")

          for url, pkg_ver in pkg_deps.items():
              if url not in pbx_deps:
                  errors.append(
                      f"EXTRA in Package.swift (not in pbxproj): {url} @ {pkg_ver}\n"
                      f"  Either add it to the Xcode project or remove it from Package.swift"
                  )

          if errors:
              print(f"\n--- {len(errors)} SYNC ERROR(S) ---")
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print(f"\nAll {len(pbx_deps)} package(s) in sync.")
          PYEOF

  # ------------------------------------------------------------------ #
  #  4. Dependency review – block PRs that introduce known-bad deps     #
  # ------------------------------------------------------------------ #
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later
          comment-summary-in-pr: never
