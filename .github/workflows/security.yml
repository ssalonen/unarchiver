name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"   # every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # needed to upload SARIF to GitHub Security tab
  pull-requests: read

jobs:
  # ------------------------------------------------------------------ #
  #  1. CodeQL – static analysis on your own Swift code                 #
  # ------------------------------------------------------------------ #
  codeql:
    name: CodeQL (Swift)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Install XcodeGen and generate the project BEFORE initializing CodeQL.
      # CodeQL's init injects a build tracer via DYLD_INSERT_LIBRARIES, which
      # makes Homebrew detect itself as running under Rosetta 2 and refuse to
      # install into the ARM prefix (/opt/homebrew). Running brew here keeps it
      # in a normal, untraced environment. Project generation doesn't need to
      # be traced — only the Swift build below does.
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          # Catch common issues: injection, unsafe deserialization, path traversal, etc.
          queries: security-extended

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Cache SPM packages
        id: spm-cache
        uses: actions/cache@v5
        with:
          path: SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve packages
        if: steps.spm-cache.outputs.cache-hit != 'true'
        run: |
          xcodebuild -resolvePackageDependencies \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build (for CodeQL)
        run: |
          xcodebuild build \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath SourcePackages \
            -jobs $(sysctl -n hw.logicalcpu) \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            RUN_CLANG_STATIC_ANALYZER=NO \
            ENABLE_TESTABILITY=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"

  # ------------------------------------------------------------------ #
  #  2. OSV Scanner – known CVEs in dependencies                        #
  # ------------------------------------------------------------------ #
  osv:
    name: OSV Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Query OSV API for Swift dependencies
        run: |
          python3 - <<'PYEOF'
          import json, sys, urllib.request

          with open("Package.resolved") as f:
              pins = json.load(f)["pins"]

          queries = [
              {"package": {"purl": "pkg:swift/{}@{}".format(
                  p["location"].removeprefix("https://"),
                  p["state"]["version"])}}
              for p in pins
          ]

          body = json.dumps({"queries": queries}).encode()
          req = urllib.request.Request(
              "https://api.osv.dev/v1/querybatch",
              data=body,
              headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req) as resp:
              results = json.loads(resp.read())["results"]

          found = False
          for pin, result in zip(pins, results):
              vulns = result.get("vulns", [])
              if vulns:
                  found = True
                  ids = ", ".join(v["id"] for v in vulns)
                  print(f"VULNERABLE: {pin['identity']} {pin['state']['version']} — {ids}")
              else:
                  print(f"OK: {pin['identity']} {pin['state']['version']}")

          if found:
              sys.exit(1)
          PYEOF

  # ------------------------------------------------------------------ #
  #  3. Supply-chain check – verify package URLs haven't changed        #
  # ------------------------------------------------------------------ #
  supply-chain:
    name: Supply-chain Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify expected package URLs
        run: |
          python3 - <<'PYEOF'
          import sys, re

          EXPECTED = {
              "SWCompression":          "https://github.com/tsolomko/SWCompression",
              "Highlightr":             "https://github.com/raspu/Highlightr",
              "swift-snapshot-testing": "https://github.com/pointfreeco/swift-snapshot-testing",
          }

          with open("project.yml") as f:
              project_yml = f.read()

          errors = []
          for name, url in EXPECTED.items():
              # Match a package entry:  <name>:\n    url: <url>
              pattern = rf'(?m)^\s+{re.escape(name)}:\s*\n\s+url:\s*"?([^"\s]+)"?'
              m = re.search(pattern, project_yml)
              if not m:
                  errors.append(f"MISSING: {name} not found in project.yml")
              elif m.group(1) != url:
                  errors.append(
                      f"MISMATCH: {name}\n"
                      f"  expected: {url}\n"
                      f"  found:    {m.group(1)}"
                  )
              else:
                  print(f"OK  {name}  →  {url}")

          if errors:
              print("\n--- SUPPLY CHAIN ERRORS ---")
              for e in errors:
                  print(e)
              sys.exit(1)
          PYEOF

      - name: Verify Package.swift matches project.yml
        run: |
          python3 - <<'PYEOF'
          import re, sys

          project_yml = open("project.yml").read()
          pkg_swift   = open("Package.swift").read()

          # --- Parse project.yml -----------------------------------------------
          # The packages: section looks like:
          #   packages:
          #     NAME:
          #       url: URL
          #       from: X.Y.Z
          block = re.search(r'(?ms)^packages:\s*\n(.*?)(?=^\S|\Z)', project_yml)
          if not block:
              print("ERROR: packages: section not found in project.yml")
              sys.exit(1)

          # Each package lists url then from on consecutive lines; pair them up.
          pbx_deps = {
              url: ver
              for url, ver in re.findall(
                  r'(?m)^\s+url:\s*"?([^"\s]+)"?\s*\n\s+from:\s*"?([^"\s]+)"?',
                  block.group(1)
              )
          }

          if not pbx_deps:
              print("ERROR: no packages parsed from project.yml")
              sys.exit(1)

          # --- Parse Package.swift ---------------------------------------------
          # Lines look like:
          #   .package(url: "URL", from: "X.Y.Z"),
          pkg_deps = {
              url: ver
              for url, ver in re.findall(
                  r'\.package\s*\(\s*url:\s*"([^"]+)"\s*,\s*from:\s*"([^"]+)"',
                  pkg_swift
              )
          }

          # --- Compare both ways -----------------------------------------------
          errors = []

          for url, pbx_ver in pbx_deps.items():
              if url not in pkg_deps:
                  errors.append(
                      f"MISSING from Package.swift:\n"
                      f"  {url}  (project.yml requires {pbx_ver})\n"
                      f"  Add:  .package(url: \"{url}\", from: \"{pbx_ver}\")"
                  )
              elif pkg_deps[url] != pbx_ver:
                  errors.append(
                      f"VERSION MISMATCH: {url}\n"
                      f"  project.yml requires   : {pbx_ver}\n"
                      f"  Package.swift declares : {pkg_deps[url]}"
                  )
              else:
                  print(f"OK  {url}  @  {pbx_ver}")

          for url, pkg_ver in pkg_deps.items():
              if url not in pbx_deps:
                  errors.append(
                      f"EXTRA in Package.swift (not in project.yml): {url} @ {pkg_ver}\n"
                      f"  Either add it to project.yml or remove it from Package.swift"
                  )

          if errors:
              print(f"\n--- {len(errors)} SYNC ERROR(S) ---")
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print(f"\nAll {len(pbx_deps)} package(s) in sync.")
          PYEOF

  # ------------------------------------------------------------------ #
  #  4. Dependency review – block PRs that introduce known-bad deps     #
  # ------------------------------------------------------------------ #
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later
          comment-summary-in-pr: never
