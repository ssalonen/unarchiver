name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Fast path: only the word wrap + scrolling UI tests ─────────────────────
  # DerivedData is cached by app-source hash, not test-file hash, so pushing
  # only test changes gets a cache hit and pays only incremental recompile (~30s)
  # instead of a full 4-min rebuild.
  word-wrap:
    name: Word Wrap & Scrolling Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM packages
        uses: actions/cache@v6
        with:
          path: SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Pick simulator
        run: |
          SIM_UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          phones = [v for devs in data['devices'].values() for v in devs
                    if 'iPhone 17 Pro' == v.get('name','') and v.get('isAvailable', False)]
          if not phones:
              phones = [v for devs in data['devices'].values() for v in devs
                        if 'iPhone 17' in v.get('name','') and v.get('isAvailable', False)]
          phones.sort(key=lambda x: x['name'])
          print(phones[-1]['udid'] if phones else '')
          ")
          if [ -z "$SIM_UDID" ]; then echo "No iPhone 17 simulator found" >&2; exit 1; fi
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true

      # Key on app sources only — test-file-only changes get a cache hit.
      - name: Cache DerivedData (app sources key)
        uses: actions/cache@v6
        with:
          path: .build/DerivedDataWW
          key: ${{ runner.os }}-dd-ww-${{ hashFiles('UnArchiver/**/*.swift', 'project.yml', 'Package.resolved') }}
          restore-keys: ${{ runner.os }}-dd-ww-

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            -derivedDataPath .build/DerivedDataWW \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            2>&1 | grep -E "^(error:|Build (complete|SUCCEEDED|FAILED)|.*: error:|.*: warning:)" || true

      - name: Run word wrap + scrolling tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            -derivedDataPath .build/DerivedDataWW \
            -only-testing:UnArchiverUITests/TextViewerWordWrapBehaviorTests \
            -only-testing:UnArchiverUITests/TextViewerWrapToggleClippingTests \
            -only-testing:UnArchiverUITests/TextViewerNoWrapRenderingTests \
            -only-testing:UnArchiverUITests/TextViewerScrollingTests \
            -parallel-testing-enabled NO \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 120 \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee /tmp/ww-tests.log; TEST_EXIT=${PIPESTATUS[0]}
          grep -E "Test Case|passed|failed|\*\* TEST" /tmp/ww-tests.log || true
          exit $TEST_EXIT

  # ── Full build + unit tests + UI tests + coverage ──────────────────────────
  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List schemes
        run: xcodebuild -list -project UnArchiver.xcodeproj

      - name: Cache SPM packages
        id: spm-cache
        uses: actions/cache@v6
        with:
          path: SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Pick simulator
        run: |
          # Pin to a specific model so snapshot reference images stay stable
          SIM_UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          phones = [
              v for devs in data['devices'].values()
              for v in devs
              if 'iPhone 17 Pro' == v.get('name', '') and v.get('isAvailable', False)
          ]
          if not phones:
              # Fallback: any iPhone 17 variant
              phones = [
                  v for devs in data['devices'].values()
                  for v in devs
                  if 'iPhone 17' in v.get('name', '') and v.get('isAvailable', False)
              ]
          phones.sort(key=lambda x: x['name'])
          print(phones[-1]['udid'] if phones else '')
          ")
          if [ -z "$SIM_UDID" ]; then
            echo "No available iPhone 17 simulator found" >&2; exit 1
          fi
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true

      # ── Unit tests ────────────────────────────────────────────────────────
      # Build WITHOUT -enableCodeCoverage so the binary is not instrumented.
      # BUNDLE_LOADER tests injected into an instrumented binary cause
      # xcodebuild to wait ~62 s for profdata harvest, then fail (exit 65).
      - name: Build for unit tests
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            -derivedDataPath .build/DerivedDataUnit \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | xcbeautify --renderer github-actions

      - name: Run unit tests
        run: |
          xcodebuild test-without-building \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiverUnitTests \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            -derivedDataPath .build/DerivedDataUnit \
            -resultBundlePath .build/unit-tests.xcresult \
            -parallel-testing-enabled NO \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 300 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee /tmp/unit-tests.log; UNIT_EXIT=${PIPESTATUS[0]}
          # BUNDLE_LOADER tests on iOS simulator always cause xcodebuild to
          # wait ~120 s for profdata harvest then exit 65 with
          # ** TEST EXECUTE FAILED ** even when all tests pass.
          # Distinguish that infrastructure failure from real test failures
          # (** TEST FAILED **) so CI only breaks on actual regressions.
          if grep -q '\*\* TEST FAILED \*\*' /tmp/unit-tests.log; then
            exit "${UNIT_EXIT:-1}"
          fi

      - name: Reset simulator app state
        if: always()
        run: |
          xcrun simctl terminate "$SIM_UDID" com.yourcompany.unarchiver 2>/dev/null || true
          xcrun simctl uninstall "$SIM_UDID" com.yourcompany.unarchiver 2>/dev/null || true

      # ── UI tests + coverage ───────────────────────────────────────────────
      # Separate build WITH -enableCodeCoverage. XCUITests harvest profdata
      # from the xctest-runner process, so this works correctly.
      - name: Build for UI tests
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            -derivedDataPath .build/DerivedData \
            -clonedSourcePackagesDirPath SourcePackages \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | xcbeautify --renderer github-actions

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            -derivedDataPath .build/DerivedData \
            -resultBundlePath .build/ui-tests.xcresult \
            -parallel-testing-enabled NO \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 300 \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | xcbeautify --renderer github-actions

      - name: Export code coverage
        if: always()
        run: |
          XCRESULT=.build/ui-tests.xcresult
          if [ ! -d "$XCRESULT" ]; then
            XCRESULT=$(find .build/DerivedData -name "*.xcresult" -maxdepth 6 | sort | tail -1)
          fi
          if [ -z "$XCRESULT" ]; then
            echo "No .xcresult found — skipping coverage export"
            exit 0
          fi
          xcrun xccov view --report --json "$XCRESULT" > coverage.json || {
            echo "xccov failed — skipping coverage summary"
            exit 0
          }
          python3 - <<'PYEOF'
          import json, os

          with open("coverage.json") as f:
              data = json.load(f)

          targets = data.get("targets", [])
          app = next(
              (t for t in targets
               if t.get("name","").startswith("UnArchiver")
               and not t.get("name","").startswith("UnArchiverUITests")),
              None
          )

          if not app:
              print("App target not found in coverage report")
              raise SystemExit(0)

          total = app.get("lineCoverage", 0) * 100
          files = sorted(app.get("files", []), key=lambda x: x.get("lineCoverage", 0))

          # ── Job summary (shown on the Actions run page) ──────────────────
          bar_filled = int(total / 5)
          bar = "█" * bar_filled + "░" * (20 - bar_filled)
          emoji = "✅" if total >= 80 else "⚠️" if total >= 60 else "❌"

          summary_lines = [
              f"## {emoji} Code Coverage — {total:.1f}%",
              f"`{bar}` {total:.1f}%",
              "",
              "| File | Coverage |",
              "|------|----------|",
          ]
          for f in files:
              fc = f.get("lineCoverage", 0) * 100
              icon = "✅" if fc >= 80 else "⚠️" if fc >= 60 else "❌"
              summary_lines.append(f"| {f['name']} | {icon} {fc:.1f}% |")

          summary = "\n".join(summary_lines)

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a") as f:
                  f.write(summary + "\n")

          # ── PR comment body (written to file for next step) ──────────────
          with open("coverage_comment.md", "w") as f:
              f.write("<!-- coverage-report -->\n")
              f.write(summary + "\n")

          print(f"App line coverage: {total:.1f}%")
          for f in files:
              fc = f.get("lineCoverage", 0) * 100
              if fc < 80:
                  print(f"  {f['name']:50s}  {fc:.1f}%")
          PYEOF

      - name: Post coverage comment on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f coverage_comment.md ]; then exit 0; fi
          PR=${{ github.event.pull_request.number }}
          MARKER="<!-- coverage-report -->"
          # Find existing comment to update rather than posting a new one
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$(cat coverage_comment.md)"
          else
            gh pr comment "$PR" --body-file coverage_comment.md
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.json
          if-no-files-found: ignore

  # ── Auto-release on green main ─────────────────────────────────────────────
  # Runs only after BOTH test jobs pass on a push to main (the `needs` gate is
  # what makes this fire exclusively on a "green" commit). It computes the next
  # semantic version from Conventional Commits made since the last release tag:
  #
  #   feat: / feat(scope):        → minor bump
  #   fix: / perf:                → patch bump
  #   feat!: / BREAKING CHANGE:   → major bump
  #   chore/docs/test/ci/etc only → NO release
  #
  # Skipping releases for non-functional commits keeps version numbers
  # meaningful and self-defuses the loop: the release workflow's own
  # "chore: update AltStore source" commit is non-releasable, so it can never
  # trigger another release.
  compute-version:
    name: Compute release version
    needs: [build, word-wrap]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.semver.outputs.should_release }}
      new_tag: ${{ steps.semver.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history + tags needed to find the last release

      - name: Compute next version from Conventional Commits
        id: semver
        run: |
          python3 - <<'PYEOF'
          import json, os, re, subprocess

          def sh(*args):
              return subprocess.run(args, capture_output=True, text=True).stdout.strip()

          semver_re = re.compile(r'^v?(\d+)\.(\d+)\.(\d+)$')

          def parse(v):
              m = semver_re.match(v or "")
              return tuple(int(x) for x in m.groups()) if m else (0, 0, 0)

          # Highest semver git tag, e.g. v3.1.4
          tags = sh("git", "tag", "--sort=-v:refname").splitlines()
          semver_tags = [t for t in tags if re.match(r'^v\d+\.\d+\.\d+$', t)]
          latest_tag = semver_tags[0] if semver_tags else None

          # Base version = max(latest tag, version already published in the
          # AltStore source). The source floor defends against tags missing
          # from the clone so the version can only ever move forward.
          base = parse(latest_tag)
          try:
              with open("altstore-source.json") as f:
                  src_ver = json.load(f)["apps"][0].get("version", "0.0.0")
              base = max(base, parse(src_ver))
          except Exception as e:
              print("Could not read source version:", e)

          # Commits to classify: since the last tag (whole history if none).
          rng = f"{latest_tag}..HEAD" if latest_tag else "HEAD"
          log = sh("git", "log", rng, "--pretty=format:%s%x1f%b%x1e")
          entries = [e for e in log.split("\x1e") if e.strip()]

          rank = {"patch": 1, "minor": 2, "major": 3}
          feat_re = re.compile(r'^feat(\(.+?\))?:', re.I)
          fix_re = re.compile(r'^(fix|perf)(\(.+?\))?:', re.I)
          breaking_re = re.compile(r'^\w+(\(.+?\))?!:')

          chosen = None
          for e in entries:
              subject, _, body = e.partition("\x1f")
              # git separates log entries with a newline, so each subject after
              # the first arrives with a leading "\n" — strip it before matching.
              subject = subject.strip()
              if "BREAKING CHANGE" in (subject + "\n" + body) or breaking_re.match(subject):
                  level = "major"
              elif feat_re.match(subject):
                  level = "minor"
              elif fix_re.match(subject):
                  level = "patch"
              else:
                  continue
              if chosen is None or rank[level] > rank[chosen]:
                  chosen = level

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              if chosen is None:
                  out.write("should_release=false\n")
                  print(f"No releasable commits since {latest_tag or '(start)'} — skipping release")
              else:
                  M, m, p = base
                  if chosen == "major":
                      M, m, p = M + 1, 0, 0
                  elif chosen == "minor":
                      m, p = m + 1, 0
                  else:
                      p += 1
                  new_tag = f"v{M}.{m}.{p}"
                  out.write("should_release=true\n")
                  out.write(f"new_tag={new_tag}\n")
                  print(f"{chosen} bump from base v{base[0]}.{base[1]}.{base[2]} -> {new_tag}")
          PYEOF

      - name: Push tag
        if: steps.semver.outputs.should_release == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.semver.outputs.new_tag }}"
          git push origin "${{ steps.semver.outputs.new_tag }}"

  # Reuses the existing build/publish pipeline. Invoked via workflow_call (not
  # the tag-push trigger) because pushes made with GITHUB_TOKEN do not start new
  # workflow runs — so this is the only path that fires, and never twice.
  release:
    name: Build & release
    needs: compute-version
    if: needs.compute-version.outputs.should_release == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.compute-version.outputs.new_tag }}
    permissions:
      contents: write
