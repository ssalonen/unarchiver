name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project UnArchiver.xcodeproj

      - name: Cache SPM packages
        id: spm-cache
        uses: actions/cache@v5
        with:
          path: SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('UnArchiver.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift packages
        if: steps.spm-cache.outputs.cache-hit != 'true'
        run: |
          xcodebuild -resolvePackageDependencies \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build app (simulator, no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -clonedSourcePackagesDirPath SourcePackages \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | xcbeautify --renderer github-actions

      - name: Pick simulator
        run: |
          SIM_UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          phones = [
              v for devs in data['devices'].values()
              for v in devs
              if 'iPhone' in v.get('name', '') and v.get('isAvailable', False)
          ]
          phones.sort(key=lambda x: x['name'])
          print(phones[-1]['udid'] if phones else '')
          ")
          if [ -z "$SIM_UDID" ]; then
            echo "No available iPhone simulator found" >&2; exit 1
          fi
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | xcbeautify --renderer github-actions
