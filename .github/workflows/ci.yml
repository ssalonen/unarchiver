name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (iOS)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project UnArchiver.xcodeproj

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver

      - name: Build app (no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee /tmp/build.log; STATUS=${PIPESTATUS[0]}; \
          if [ $STATUS -ne 0 ]; then \
            echo ""; \
            echo "=== BUILD ERRORS ==="; \
            grep -E "error:|BUILD FAILED" /tmp/build.log | head -40 || true; \
          fi; \
          exit $STATUS
