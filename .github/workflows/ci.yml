name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project UnArchiver.xcodeproj

      - name: Cache SPM packages
        id: spm-cache
        uses: actions/cache@v5
        with:
          path: SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('UnArchiver.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build app (simulator, no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -clonedSourcePackagesDirPath SourcePackages \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | xcbeautify --renderer github-actions

      - name: Pick simulator
        run: |
          # Pin to a specific model so snapshot reference images stay stable
          SIM_UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          phones = [
              v for devs in data['devices'].values()
              for v in devs
              if 'iPhone 17 Pro' == v.get('name', '') and v.get('isAvailable', False)
          ]
          if not phones:
              # Fallback: any iPhone 17 variant
              phones = [
                  v for devs in data['devices'].values()
                  for v in devs
                  if 'iPhone 17' in v.get('name', '') and v.get('isAvailable', False)
              ]
          phones.sort(key=lambda x: x['name'])
          print(phones[-1]['udid'] if phones else '')
          ")
          if [ -z "$SIM_UDID" ]; then
            echo "No available iPhone 17 simulator found" >&2; exit 1
          fi
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            -clonedSourcePackagesDirPath SourcePackages \
            -parallel-testing-enabled NO \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 300 \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | xcbeautify --renderer github-actions

      - name: Export code coverage
        if: always()
        run: |
          XCRESULT=$(find ~/Library/Developer/Xcode/DerivedData -name "*.xcresult" | sort -t_ -k2 | tail -1)
          if [ -n "$XCRESULT" ]; then
            xcrun xccov view --report --json "$XCRESULT" > coverage.json
            python3 - <<'PYEOF'
          import json, sys
          with open("coverage.json") as f:
              data = json.load(f)
          targets = data.get("targets", [])
          app = next((t for t in targets if t.get("name","").startswith("UnArchiver") and not t.get("name","").startswith("UnArchiverUITests")), None)
          if app:
              pct = app.get("lineCoverage", 0) * 100
              print(f"App line coverage: {pct:.1f}%")
              for file in sorted(app.get("files", []), key=lambda x: x.get("lineCoverage", 1)):
                  fc = file.get("lineCoverage", 1) * 100
                  if fc < 80:
                      print(f"  {file['name']:50s}  {fc:5.1f}%")
          else:
              print("App target not found in coverage report")
          PYEOF
          else
            echo "No .xcresult found — skipping coverage export"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.json
          if-no-files-found: ignore
