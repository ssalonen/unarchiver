name: Build & Release

# Trigger by pushing a version tag: git tag v1.0 && git push origin v1.0
# Also callable from bump.yml via workflow_call.
on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.9)'
        required: true
        type: string

permissions:
  contents: write   # needed to push altstore-source.json and create release

jobs:
  release:
    name: Build & Release IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Check out the tag so the IPA is built with the correct version number.
          # The commit step will switch to main before pushing altstore-source.json.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION_NUM="${TAG#v}"
          echo "TAG=$TAG"             >> "$GITHUB_ENV"
          echo "VERSION_NUM=$VERSION_NUM" >> "$GITHUB_ENV"

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver

      - name: Build archive (unsigned)
        run: |
          xcodebuild archive \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/UnArchiver.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            MARKETING_VERSION="${VERSION_NUM}" \
            CURRENT_PROJECT_VERSION="${VERSION_NUM}"

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/UnArchiver.xcarchive" -name "*.app" | head -1)
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r UnArchiver.ipa Payload/
          echo "IPA_PATH=$RUNNER_TEMP/UnArchiver.ipa" >> "$GITHUB_ENV"
          echo "IPA_SIZE=$(wc -c < UnArchiver.ipa | tr -d ' ')" >> "$GITHUB_ENV"

      - name: Update altstore-source.json
        run: |
          export DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/UnArchiver.ipa"
          export DATE="$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")"

          python3 - <<'PYEOF'
          import json, os, shutil

          version_num  = os.environ["VERSION_NUM"]
          ipa_size     = int(os.environ["IPA_SIZE"])
          download_url = os.environ["DOWNLOAD_URL"]
          date         = os.environ["DATE"]

          with open("altstore-source.json") as f:
              source = json.load(f)

          app = source["apps"][0]

          new_entry = {
              "version": version_num,
              "date": date,
              "localizedDescription": "See GitHub release notes.",
              "downloadURL": download_url,
              "size": ipa_size,
              "minOSVersion": "17.0",
          }

          # Remove any existing entry for this version then prepend fresh one
          app["versions"] = [v for v in app.get("versions", []) if v["version"] != version_num]
          app["versions"].insert(0, new_entry)

          # Top-level fields required by SideStore/AltStore to determine latest version
          app["version"] = version_num
          app["versionDate"] = date
          app["versionDescription"] = "See GitHub release notes."
          app["downloadURL"] = download_url
          app["size"] = ipa_size

          with open("altstore-source.json", "w") as f:
              json.dump(source, f, indent=2)
              f.write("\n")
          # Stash a copy so the commit step can apply it after switching to main
          shutil.copy("altstore-source.json", os.path.join(os.environ["RUNNER_TEMP"], "altstore-source.json"))

          print(f"Updated source to {version_num} ({ipa_size} bytes)")
          PYEOF

      - name: Commit updated source JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          # Switch to main so the JSON update lands on the default branch
          git fetch origin main
          git checkout main
          # Re-apply the Python-generated JSON (it was written on the tag checkout)
          cp "$RUNNER_TEMP/altstore-source.json" altstore-source.json
          git add altstore-source.json
          if git diff --cached --quiet; then
            echo "No changes to altstore-source.json"
          else
            git commit -m "chore: update AltStore source for ${TAG}"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: "UnArchiver ${{ env.VERSION_NUM }}"
          body: |
            ## Install via SideStore / AltStore

            **Add this source URL in SideStore/AltStore:**
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/altstore-source.json
            ```

            Or [download the IPA directly](https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/UnArchiver.ipa) and open it in SideStore/AltStore.

            ---
            *Unsigned build — SideStore/AltStore will sign it with your Apple ID on install.*
          files: ${{ env.IPA_PATH }}
          fail_on_unmatched_files: true
