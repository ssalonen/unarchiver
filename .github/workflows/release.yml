name: Build & Release

# Trigger by pushing a version tag: git tag v1.0 && git push origin v1.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15        # Xcode 16 — change to macos-14 for Xcode 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          # List available Xcode versions and pick the latest
          ls /Applications | grep Xcode
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver

      - name: Build archive (unsigned)
        run: |
          xcodebuild archive \
            -project UnArchiver.xcodeproj \
            -scheme UnArchiver \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/UnArchiver.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/UnArchiver.xcarchive" -name "*.app" | head -1)
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r UnArchiver.ipa Payload/
          echo "IPA_PATH=$RUNNER_TEMP/UnArchiver.ipa" >> "$GITHUB_ENV"
          echo "IPA_SIZE=$(wc -c < UnArchiver.ipa | tr -d ' ')" >> "$GITHUB_ENV"

      - name: Get version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"          # e.g. v1.2
          VERSION_NUM="${VERSION#v}"                  # e.g. 1.2
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_NUM=$VERSION_NUM" >> "$GITHUB_ENV"

      - name: Update altstore-source.json
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/UnArchiver.ipa"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")"

          python3 - <<PYEOF
          import json, os

          version_num  = os.environ["VERSION_NUM"]
          ipa_size     = int(os.environ["IPA_SIZE"])
          download_url = os.environ["DOWNLOAD_URL"]
          date         = os.environ["DATE"]

          with open("altstore-source.json") as f:
              source = json.load(f)

          app = source["apps"][0]

          new_version = {
              "version": version_num,
              "date": date,
              "localizedDescription": "See GitHub release notes.",
              "downloadURL": download_url,
              "size": ipa_size,
              "minOSVersion": "16.0"
          }

          # Prepend so newest is first
          app.setdefault("versions", []).insert(0, new_version)

          with open("altstore-source.json", "w") as f:
              json.dump(source, f, indent=2)
              f.write("\n")

          print(f"Updated source to {version_num}")
          PYEOF
        env:
          DOWNLOAD_URL: "https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/UnArchiver.ipa"
          DATE: "$(date -u +\"%Y-%m-%dT%H:%M:%S+00:00\")"

      - name: Commit updated source JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          git commit -m "chore: update AltStore source for ${VERSION}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "UnArchiver ${{ env.VERSION }}"
          body: |
            ## Install via SideStore / AltStore

            **Add this source URL:**
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/altstore-source.json
            ```

            Or [download the IPA directly](https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/UnArchiver.ipa) and open it in SideStore/AltStore.

            ---
            *Unsigned IPA — SideStore/AltStore will sign it with your Apple ID.*
          files: ${{ env.IPA_PATH }}
          fail_on_unmatched_files: true
